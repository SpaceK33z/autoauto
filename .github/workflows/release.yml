name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  build:
    name: Build (${{ matrix.artifact }})
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            os: macos-latest
            artifact: autoauto-darwin-arm64
          - target: bun-darwin-x64
            os: macos-latest
            artifact: autoauto-darwin-x64
            cross_platform: darwin-x64
          - target: bun-linux-x64
            os: ubuntu-latest
            artifact: autoauto-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-24.04-arm
            artifact: autoauto-linux-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Install cross-platform native deps
        if: matrix.cross_platform
        run: |
          OPENTUI_VERSION=$(bun -e "console.log(require('@opentui/core/package.json').version)")
          npm install --no-save --force @opentui/core-${{ matrix.cross_platform }}@$OPENTUI_VERSION
      - run: bun build --compile --target=${{ matrix.target }} src/index.tsx --outfile dist/${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  upload:
    name: Upload Release Assets
    needs: [release-please, build]
    if: ${{ always() && needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - run: chmod +x artifacts/*
      - run: |
          for f in artifacts/*; do
            gh release upload ${{ needs.release-please.outputs.tag_name }} "$f" --clobber
          done
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

  npm-publish:
    name: Publish to npm
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm publish --provenance --access public

  update-homebrew:
    name: Update Homebrew formula
    needs: [release-please, upload]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
      - name: Trigger formula update
        run: |
          gh api repos/SpaceK33z/homebrew-autoauto/dispatches \
            -f event_type=update-formula \
            -f "client_payload[version]=${{ steps.version.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
